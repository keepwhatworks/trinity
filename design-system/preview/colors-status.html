<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
:root{--bg:#eaecef;--bg2:#eff1f4;--surface:#fafbfc;--muted-s:#f1f3f6;--line:#dde1e6;--line2:#e7eaee;
--ink:#2f363c;--ink2:#5b646b;--muted:#616a73;--teal:#4f9095;--teal-d:#34666b;--teal-fill:#3f777c;--teal-soft:#e1edec;--teal-text:#fbfdfc;
--quiet:#94a3ad;--success:#4f9095;--warning:#bd9658;--danger:#bd6a5a;--info:#7fa0ad;
--sans:"Hanken Grotesk","SF Pro Text",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;
--sh:0 4px 18px rgba(60,72,86,.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{width:700px;padding:26px 28px;}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--teal-d);display:inline-flex;align-items:center;gap:9px;margin-bottom:16px;}
.eyebrow::before{content:"";width:18px;height:1.5px;border-radius:2px;background:var(--teal);opacity:.7;}
.mono{font-family:var(--mono);}
</style></head><body><div class="wrap">
<div class="eyebrow">Semantic status · soft washes</div>
<div style="display:flex;gap:12px;"><div style="flex:1;min-width:0;"><div style="height:54px;background:#4f9095;border:1px solid var(--line);border-radius:14px;"></div><div style="font-size:12px;font-weight:600;margin-top:8px;">success</div><div class="mono" style="font-size:11px;color:var(--muted);">#4f9095</div></div><div style="flex:1;min-width:0;"><div style="height:54px;background:#bd9658;border:1px solid var(--line);border-radius:14px;"></div><div style="font-size:12px;font-weight:600;margin-top:8px;">warning</div><div class="mono" style="font-size:11px;color:var(--muted);">#bd9658</div></div><div style="flex:1;min-width:0;"><div style="height:54px;background:#bd6a5a;border:1px solid var(--line);border-radius:14px;"></div><div style="font-size:12px;font-weight:600;margin-top:8px;">danger</div><div class="mono" style="font-size:11px;color:var(--muted);">#bd6a5a</div></div><div style="flex:1;min-width:0;"><div style="height:54px;background:#7fa0ad;border:1px solid var(--line);border-radius:14px;"></div><div style="font-size:12px;font-weight:600;margin-top:8px;">info</div><div class="mono" style="font-size:11px;color:var(--muted);">#7fa0ad</div></div></div>
<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
<span style="background:#e1edec;color:#34666b;font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;">Synthesized</span>
<span style="background:#f1ece1;color:#9a7d4c;font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;">Pending</span>
<span style="background:#f3e8e5;color:#a86555;font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;">Failed</span>
<span style="background:#e6eef1;color:#5f7f8c;font-size:12px;font-weight:600;padding:6px 13px;border-radius:999px;">Optional</span>
</div></div></body></html>
