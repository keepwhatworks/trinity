<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
:root{--bg:#eaecef;--bg2:#eff1f4;--surface:#fafbfc;--muted-s:#f1f3f6;--line:#dde1e6;--line2:#e7eaee;
--ink:#2f363c;--ink2:#5b646b;--muted:#616a73;--teal:#4f9095;--teal-d:#34666b;--teal-fill:#3f777c;--teal-soft:#e1edec;--teal-text:#fbfdfc;
--quiet:#94a3ad;--info:#7fa0ad;--sans:"Hanken Grotesk","SF Pro Text",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;
--sh:0 4px 18px rgba(60,72,86,.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{width:700px;padding:26px 28px;}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--teal-d);display:inline-flex;align-items:center;gap:9px;margin-bottom:16px;}
.eyebrow::before{content:"";width:18px;height:1.5px;border-radius:2px;background:var(--teal);opacity:.7;}
.eyebrow.info{color:#5f7f8c;}.eyebrow.info::before{background:var(--info);}
.mono{font-family:var(--mono);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;}
.btn.primary{background:var(--teal-fill);color:var(--teal-text);border-color:var(--teal-fill);box-shadow:0 6px 18px rgba(77,139,144,.28);}
.btn.ghost{background:transparent;border-color:transparent;color:var(--teal-d);}
.h2{font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1.25;margin:6px 0 8px;}
.desc{font-size:14px;color:var(--ink2);line-height:1.65;}
</style></head><body><div class="wrap">
<div class="eyebrow">Badges &amp; pills</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
<span style="background:var(--teal-soft);color:var(--teal-d);font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px;">Lens pick</span>
<span style="background:#e6eef1;color:#5f7f8c;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px;">Optional</span>
<span style="background:var(--muted-s);color:var(--ink2);font-size:12.5px;font-weight:500;padding:6px 13px;border-radius:999px;border:1px solid var(--line);">Confidence: high</span></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;">
<span style="padding:5px 14px;background:var(--surface);border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--ink2);">code_review</span><span style="padding:5px 14px;background:var(--surface);border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--ink2);">architecture</span><span style="padding:5px 14px;background:var(--surface);border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--ink2);">naming</span></div></div></body></html>
